<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rankings Dashboard – ULTRON AI</title>
  <link rel="stylesheet" href="static/css/main.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/animations.css">
</head>
<body>

  <div class="app-container">
    <main class="main-wrapper fade-in-up">
      <div class="header-panel">
        <div class="header-title">
          <h1>AI Candidate Rankings</h1>
          <p id="rankings-headline">Ranked lists based on cognitive semantic alignment.</p>
        </div>
       <div class="header-actions">
  <button id="downloadCSV" class="btn btn-primary">
    ⬇ Download CSV
  </button>

  <button id="re-analyze-btn" class="btn btn-secondary">
    🔄 Re-run Analysis
  </button>
</div>
      </div>

      <!-- Active Job Selector Banner -->
      <div class="card" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.75rem;">
        <div>
          <span style="font-size: 0.85rem; font-weight: bold; text-transform: uppercase; color: var(--text-light);">Evaluating For Job:</span>
          <h3 id="active-job-title" style="color: var(--primary-color); margin-top: 0.25rem;">No Active Job Stated</h3>
        </div>
        <div>
          <select id="job-selector" class="form-control" style="width: 260px;">
            <option value="">Select Job...</option>
          </select>
        </div>
      </div>

      <!-- Rankings Table -->
      <div class="card">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th style="width: 70px;">Rank</th>
                <th>Candidate Name</th>
                <th>Skill Score</th>
                <th>Exp Score</th>
                <th>Projects</th>
                <th>Overall Fit</th>
                <th>Rec. Decision</th>
                <th style="width: 120px; text-align: center;">Actions</th>
              </tr>
            </thead>
            <tbody id="rankings-table-body">
              <tr>
                <td colspan="8" style="text-align: center; color: var(--text-light); padding: 3rem;">
                  No active job evaluation run. Please upload a Job Description first.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="static/js/api.js"></script>
  <script src="static/js/auth.js"></script>
  <script src="static/js/utils.js"></script>
  <script src="static/js/rankings.js"></script>
</body>
</html>
